# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "pt-BR"

tone_instructions: |
  Responda sempre em Português brasileiro. 
  Seja extremamente conciso e direto ao ponto. 
  Foque em sinalizar erros de lógica, riscos de segurança e bugs reais. 
  Evite elogios genéricos ou comentários óbvios para reduzir o ruído.

reviews:
  profile: "chill"
  auto_review: true
  high_level_summary: true
  
chat:
  auto_reply: true
