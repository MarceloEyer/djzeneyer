language: 'pt-BR'

tone_instructions: |
  Responda sempre em PortuguĂŞs Brasileiro.
  Seja direto e conciso. Priorize bugs reais, riscos de seguranĂ§a e violaĂ§Ăµes das
  regras do projeto. Evite elogios genĂ©ricos ou comentĂˇrios sobre style sem impacto.

reviews:
  profile: 'assertive'
  request_changes_workflow: true
  auto_review:
    enabled: true
    auto_incremental_review: true
  high_level_summary: true
  high_level_summary_placeholder: '@coderabbitai resumo'
  poem: false
  collapse_walkthrough: true

  path_filters:
    - '!dist/**'
    - '!dist-debug/**'
    - '!.claude/**'
    - '!.bolt/**'
    - '!.gemini/**'
    - '!plugins/gamipress/**'
    - '!**/*.lock'
    - '!public/sitemap*.xml'

  path_instructions:
    - path: 'src/**/*.tsx'
      instructions: |
        Regras crĂ­ticas do projeto:
        1. TODA string visĂ­vel ao usuĂˇrio deve usar t('chave') de react-i18next. Strings hardcoded em portuguĂŞs ou inglĂŞs sĂŁo BUG.
        2. Nunca usar fetch() diretamente em componentes â€” data fetching centralizado em src/hooks/useQueries.ts.
        3. safeUrl(url) retorna '#' (truthy) quando url Ă© null â€” nunca usar `safeUrl(x) || fallback`. Sempre `safeUrl(x, '/fallback')`.
        4. Guards de rota privada DEVEM usar `loadingInitial` (nĂŁo `loading`) do UserContext. `loading` Ă© para aĂ§Ăµes (login/register), default false. `loadingInitial` Ă© para restauraĂ§ĂŁo de sessĂŁo, default true.
        5. Componentes de classe nĂŁo podem usar hooks (useTranslation). Usar withTranslation() HOC da react-i18next.
        6. DashboardPage e MyAccountPage devem ter noindex=true no HeadlessSEO. Avatar do usuĂˇrio nunca pode aparecer em OG tags.
        7. ĂŤcones de marca (Facebook, Instagram, Youtube) nĂŁo existem no lucide-react 1.x â€” usar src/components/icons/BrandIcons.tsx.
        8. Framer Motion: objetos `variants`, `whileHover`, `whileTap` NUNCA inline no corpo do componente â€” extrair para escopo de mĂłdulo com SCREAMING_CASE (ex: `const CARD_VARIANTS = {...}`). Inline cria nova referĂŞncia a cada render e anula React.memo.
        9. Aspas tipogrĂˇficas "â€¦" (U+201C/U+201D) em JSX quebram o parser OXC â€” usar &ldquo;/&rdquo; ou aspas retas "".
        10. Intl.DateTimeFormat e Intl.NumberFormat NUNCA em render ou .map() sem cache â€” usar getDateTimeFormatter() e getNumberFormatter() de src/utils/.

    - path: 'src/schemas/**/*.ts'
      instructions: |
        Schemas Zod para APIs WordPress/PHP:
        - PHP `get_avatar_url()`, `get_the_post_thumbnail_url()` retornam `false` (boolean) quando nĂŁo hĂˇ imagem.
          Zod v4: `z.union([z.string(), z.literal(false)])` quebra em `null`/`undefined`.
          PadrĂŁo correto: `z.string().catch('')` (campo obrigatĂłrio) ou `z.string().catch('').optional()` (campo opcional).
        - `date_earned` de achievements pode ser null/undefined para itens nĂŁo conquistados â€” usar `z.string().catch('')`.
        - Usar `.catchall(z.unknown())` em schemas de API para aceitar campos extras sem quebrar.

    - path: 'src/hooks/useQueries.ts'
      instructions: |
        SSOT de data fetching. Verificar:
        - Novas queries devem usar QUERY_KEYS de src/config/queryClient.ts (nĂŁo strings mĂˇgicas).
        - staleTime deve ser um dos valores de STALE_TIME (nĂŁo hardcoded).
        - Erros de fetch devem ser tratados com throw (nĂŁo return null silencioso).

    - path: 'plugins/zengame/**/*.php'
      instructions: |
        Regras PHP/WooCommerce:
        - NUNCA SQL direto em wp_posts para pedidos. Usar wc_get_orders() (HPOS ativo).
        - `gamipress_get_rank_types()` retorna array associativo (slug como chave). Sempre array_values() antes de [0].
        - Cache key padrĂŁo: `djz_gamipress_{feature}_CACHE_VERSION_{user_id}`. Usar ZenGame::CACHE_VERSION constante.
        - `get_avatar_url()` pode retornar false â€” coerĂ§ĂŁo necessĂˇria antes de JSON encode.

    - path: 'plugins/zeneyer-auth/**/*.php'
      instructions: |
        - `format_user()` e `get_profile_data()` devem sempre retornar campo `avatar` (Google photo > Gravatar).
        - Nunca expor dados sensĂ­veis do usuĂˇrio em rotas pĂşblicas.
        - JWT validation deve usar a funĂ§ĂŁo centralizada do plugin, nĂŁo reimplementar.

    - path: '.github/workflows/**'
      instructions: |
        - fetch-depth deve ser 2 (nĂŁo 0 â€” evita fetch de 100+ branches).
        - Minificador: OXC (padrĂŁo Vite 8). Nunca adicionar minify: 'esbuild'.
        - composer install NUNCA deve ter --no-security-blocking sem justificativa explĂ­cita.
        - plugins/ sĂł deve ser republicado quando plugins/** mudou.

    - path: 'src/config/routes.ts'
      instructions: |
        - Novas rotas privadas (dashboard, my-account) devem ter requiresAuth: true e serem excluĂ­das de prerender e sitemap.
        - getAlternateLinks() deve gerar hreflang correto para PT e EN.
        - NĂŁo remover PREFIX_PATH_MAP sem substituir a otimizaĂ§ĂŁo O(1).

    - path: 'src/locales/**/*.json'
      instructions: |
        - Novos componentes com strings visĂ­veis DEVEM adicionar chaves em AMBOS pt/translation.json e en/translation.json.
        - Nunca usar mojibake; arquivos devem ser UTF-8 limpo.
        - Estrutura deve ser consistente entre PT e EN (mesmas chaves nos dois arquivos).

    - path: 'vite.config.ts'
      instructions: |
        - NĂŁo adicionar minify: 'esbuild' â€” Vite 8 usa OXC por padrĂŁo.
        - base deve permanecer '/wp-content/themes/zentheme/dist/'.
        - Nunca remover scripts/prerender.js do pipeline de build.

    - path: 'eslint.config.js'
      instructions: |
        - ignores DEVE incluir .claude, .agents, .bolt, .gemini, .jules, .devcontainer.
          Remover qualquer um desses causa crash por mĂşltiplos tsconfig roots.

    - path: 'src/utils/**'
      instructions: |
        UtilitĂˇrios com caching obrigatĂłrio:
        - `getDateTimeFormatter(locale, options)` em src/utils/date.ts â€” NUNCA instanciar Intl.DateTimeFormat diretamente em render ou .map().
        - `getNumberFormatter(locale, options?)` em src/utils/number.ts â€” idem para Intl.NumberFormat.
        - `safeUrl(url, fallback?)` em src/utils/sanitize.ts â€” fallback padrĂŁo Ă© '#' (truthy), sempre passar '/fallback.svg' quando necessĂˇrio.

    - path: 'scripts/**'
      instructions: |
        - scripts/prerender.js NUNCA deve ser removido â€” Ă© o que evita tela branca em produĂ§ĂŁo.
        - src/config/routes-slugs.json Ă© SSOT de rotas (React Router + sitemap + CI). MudanĂ§as aqui refletem em 3 sistemas.
        - Puppeteer: .puppeteerrc.cjs tem skipDownload:true â€” Chrome sĂł Ă© instalado no CI via `npx puppeteer browsers install chrome`.

