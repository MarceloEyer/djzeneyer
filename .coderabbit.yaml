п»ҝ# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# ConfiguraГғВ§ГғВЈo CodeRabbit - DJ Zen Eyer (WordPress Headless + Plugins + React Vite)

language: pt-BR

tone_instructions: >
  Responda sempre em portuguГғВӘs brasileiro.
  Seja direto, tГғВ©cnico e construtivo.
  Use emojis com moderaГғВ§ГғВЈo para indicar severidade (Г°ЕёвҖқВҙ crГғВӯtico, Г°ЕёЕёВЎ atenГғВ§ГғВЈo, Г°ЕёЕёВў ok).

early_access: true

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  review_status: true
  poem: false
  collapse_walkthrough: false
  sequence_diagrams: true
  changed_files_summary: true
  labeling_instructions:
    - label: "bug-fix"
      instructions: "CorreГғВ§ГғВЈo de bug"
    - label: "feature"
      instructions: "Nova funcionalidade"
    - label: "refactor"
      instructions: "RefatoraГғВ§ГғВЈo sem mudanГғВ§a de comportamento"
    - label: "docs"
      instructions: "AlteraГғВ§ГғВЈo apenas em documentaГғВ§ГғВЈo"
    - label: "deploy"
      instructions: "AlteraГғВ§ГғВЈo em CI/CD ou deploy"
    - label: "i18n"
      instructions: "InternacionalizaГғВ§ГғВЈo ou traduГғВ§ГғВЈo"
  
  auto_review:
    enabled: true
    drafts: false
    ignore_authors: []
    base_branches:
      - main
      - develop
  
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/public/**/*.xml"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/.lock"
    - "!.env*"
    - "!**/vendor/**"
  
  path_instructions:
    # Frontend React + Vite (SPA)
    - path: "src/**"
      instructions: |
        - Foque fortemente em tipos TypeScript, hooks React e gerenciamento de estado.
        - Verifique acessibilidade (ARIA, teclado, contraste de cores) em todos os componentes.
        - Valide uso de classes Tailwind para consistГғВӘncia e evite estilos duplicados.
        - Sinalize qualquer manipulaГғВ§ГғВЈo direta do DOM que nГғВЈo use React sem necessidade clara.
        - Prefira funГғВ§ГғВөes puras e testГғВЎveis; evite efeitos colaterais ocultos.
        - Cheque imports desnecessГғВЎrios e otimize tree-shaking do Vite.

    - path: "src/pages/**"
      instructions: |
        - Valide que roteamento funciona com backend WordPress headless (slugs, localizaГғВ§ГғВөes).
        - Verifique que tags SEO (titles, meta, OpenGraph) sГғВЈo preenchidas a partir de dados headless.
        - Confirme uso correto de i18next para todas as strings visГғВӯveis ao usuГғВЎrio.
        - Teste padrГғВөes de renderizaГғВ§ГғВЈo assГғВӯncrona e tratamento de erros.

    # Tema WordPress + funГғВ§ГғВөes PHP customizadas
    - path: "inc/**"
      instructions: |
        - Valide hooks e filtros WordPress seguindo boas prГғВЎticas para setups headless.
        - Verifique endpoints REST contra SQL injection e XSS.
        - Garanta que lГғВіgica de negГғВіcios nГғВЈo depende de HTML tradicional de tema; foco em API/headless.
        - Sugira refatoraГғВ§ГғВЈo de funГғВ§ГғВөes muito grandes em funГғВ§ГғВөes menores e reutilizГғВЎveis.
        - Cheque sanitizaГғВ§ГғВЈo/escaping de dados de usuГғВЎrio ou WordPress.

    - path: "*.php"
      instructions: |
        - Verifique escaping/sanitizaГғВ§ГғВЈo adequados para dados do WordPress ou entrada do usuГғВЎrio.
        - Evite funГғВ§ГғВөes descontinuadas ou APIs antigas de WordPress/PHP.
        - Valide que headers de seguranГғВ§a e configuraГғВ§ГғВөes headless nГғВЈo sГғВЈo quebrados.
        - Confirme que senhas, tokens e chaves nunca sГғВЈo hardcoded.
        - Priorize performance em queries e caches quando aplicГғВЎvel.

    # Plugin de SEO Zen
    - path: "plugins/zen-seo-lite/**"
      instructions: |
        - Garanta que geraГғВ§ГғВЈo de sitemap, schema.org e metatags ГғВ© compatГғВӯvel com ambiente headless.
        - Verifique impacto de performance e evite queries pesadas em geraГғВ§ГғВЈo de SEO.
        - Valide que nГғВЈo hГғВЎ duplicaГғВ§ГғВЈo de tags com frontend React.
        - Cheque que breadcrumbs e structured data funcionam com URLs dinГғВўmicas.

    # Plugin de AutenticaГғВ§ГғВЈo
    - path: "plugins/zeneyer-auth/**"
      instructions: |
        - Cheque fluxos JWT + Google OAuth e armazenamento de tokens (cookies/headers) com foco em seguranГғВ§a.
        - Verifique proteГғВ§ГғВЈo contra CSRF, XSS e session fixation.
        - Confirme que senhas nunca aparecem em logs ou responses.
        - Valide expiraГғВ§ГғВЈo de tokens e refresh token flow.
        - Sugira logs mГғВӯnimos de auditoria para operaГғВ§ГғВөes sensГғВӯveis de autenticaГғВ§ГғВЈo.

    # Plugin Bandsintown Integration
    - path: "plugins/zen-bit/**"
      instructions: |
        - Verifique chamadas ГғВ  API do Bandsintown (timeouts, tratamento de erro, retry logic).
        - Valide que dados recebidos sГғВЈo sanitizados antes de ir para frontend headless.
        - Cheque cache de dados de shows e sincronizaГғВ§ГғВЈo com CMS.
        - Garanta que falhas de API nГғВЈo quebram o site (fallback gracioso).

    # Plugin de Recompensas (WooCommerce + GamiPress)
      instructions: |
        - Garanta que dados de WooCommerce e GamiPress sГғВЈo acessados de forma performГғВЎtica.
        - Verifique que endpoints nГғВЈo expГғВөem informaГғВ§ГғВөes sensГғВӯveis de usuГғВЎrios.
        - Confirme que regras de gamificaГғВ§ГғВЈo funcionam corretamente com integraГғВ§ГғВөes.
        - Cheque sincronizaГғВ§ГғВЈo de dados entre WooCommerce, GamiPress e frontend.

    # GitHub Actions e CI/CD
    - path: ".github/workflows/**"
      instructions: |
        - Valide que pipeline de deploy nГғВЈo expГғВөe segredos (tokens, senhas, API keys).
        - Cheque se passos de build/test cobrem scripts React e verificaГғВ§ГғВөes bГғВЎsicas de PHP.
        - Sugira melhorias em cache do build para Vite/Tailwind e dependГғВӘncias.
        - Confirme que variГғВЎveis de ambiente sГғВЈo tratadas com seguranГғВ§a.

    # Scripts de automaГғВ§ГғВЈo
    - path: "scripts/**"
      instructions: |
        - Revise scripts de automaГғВ§ГғВЈo pensando em idempotГғВӘncia e seguranГғВ§a.
        - Garanta que chamadas remotas (APIs, SSH, rsync) tratam erros corretamente.
        - Verifique logs e outputs para dados sensГғВӯveis expostos.

    # DocumentaГғВ§ГғВЈo
    - path: "docs/**"
      instructions: |
        - Foque em clareza, consistГғВӘncia de termos e passos verificГғВЎveis de setup.
        - Garanta que instruГғВ§ГғВөes para plugins WordPress, headless e CI refletem cГғВіdigo atual.
        - Confirme que links e referГғВӘncias nГғВЈo estГғВЈo quebrados.

