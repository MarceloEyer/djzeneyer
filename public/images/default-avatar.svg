<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#070d1a"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D96FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0D96FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d2040"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>

  <!-- Subtle glow center -->
  <circle cx="100" cy="85" r="70" fill="url(#glowGrad)"/>

  <!-- Body / shoulders -->
  <ellipse cx="100" cy="175" rx="62" ry="38" fill="#0d1f3c" clip-path="url(#circle)"/>
  <ellipse cx="100" cy="168" rx="50" ry="30" fill="#0e2244" clip-path="url(#circle)"/>

  <!-- Neck -->
  <rect x="88" y="122" width="24" height="20" rx="8" fill="#1a3a6a" clip-path="url(#circle)"/>

  <!-- Head -->
  <ellipse cx="100" cy="95" rx="34" ry="36" fill="url(#faceGrad)"/>

  <!-- Inner face highlight -->
  <ellipse cx="100" cy="90" rx="24" ry="26" fill="#122a52" opacity="0.6"/>

  <!-- Eyes — electric blue -->
  <ellipse cx="88" cy="92" rx="5" ry="4.5" fill="#0D96FF" filter="url(#glow)" opacity="0.9"/>
  <ellipse cx="112" cy="92" rx="5" ry="4.5" fill="#0D96FF" filter="url(#glow)" opacity="0.9"/>
  <!-- Eye pupils -->
  <circle cx="88" cy="92" r="2.5" fill="#001a3a"/>
  <circle cx="112" cy="92" r="2.5" fill="#001a3a"/>
  <!-- Eye shine -->
  <circle cx="89.5" cy="90.5" r="1.2" fill="#7dcfff" opacity="0.8"/>
  <circle cx="113.5" cy="90.5" r="1.2" fill="#7dcfff" opacity="0.8"/>

  <!-- Eyebrows -->
  <path d="M82 85 Q88 82 94 84" stroke="#0D96FF" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M106 84 Q112 82 118 85" stroke="#0D96FF" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Subtle mouth -->
  <path d="M93 108 Q100 112 107 108" stroke="#3a6a9a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Diamond/zen mark on forehead -->
  <polygon points="100,72 104,77 100,82 96,77" fill="none" stroke="#0D96FF" stroke-width="1.2" opacity="0.7"/>
  <circle cx="100" cy="77" r="1.5" fill="#0D96FF" opacity="0.9"/>

  <!-- Ring decoration (crown/aura) -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#0D96FF" stroke-width="0.8" opacity="0.15"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#0D96FF" stroke-width="0.4" opacity="0.08"/>

  <!-- Bottom border arc -->
  <path d="M 20 180 Q 100 200 180 180" fill="#0D96FF" opacity="0.08"/>
</svg>
