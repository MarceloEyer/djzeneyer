name: Chore / Manutenção
description: Atualização de dependências, infra, refactor sem mudança de comportamento
labels: ["chore"]
body:
  - type: markdown
    attributes:
      value: |
        Para tarefas técnicas sem impacto direto no usuário final.

  - type: textarea
    id: description
    attributes:
      label: O que precisa ser feito?
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Tipo
      options:
        - Atualização de dependência (npm)
        - Atualização de dependência (Composer / PHP)
        - Refactor / limpeza de código
        - Infra / CI / CD
        - Documentação técnica
        - Outro
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist antes de fechar
      options:
        - label: Build passa localmente
        - label: Sem regressão visual/funcional
        - label: Changelog / LEARNINGS.md atualizado se necessário
