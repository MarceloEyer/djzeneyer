name: 🤖 Trigger Bot Reviews on Bot PRs

# CodeRabbit e Codex não disparam automaticamente em PRs criados por bots
# (proteção anti-bot-war por padrão). Este workflow posta os comandos de
# trigger como comentário, forçando a revisão automática em TODOS os PRs de bots.

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  trigger-reviews:
    name: Trigger CodeRabbit + Codex
    if: |
      github.event.pull_request.user.login == 'google-labs-jules' ||
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'snyk-bot' ||
      github.event.pull_request.user.login == 'renovate[bot]' ||
      github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CodeRabbit review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '@coderabbitai review'
            });

      - name: Trigger Codex review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '@codex review'
            });
