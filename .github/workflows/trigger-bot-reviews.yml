name: Trigger Bot Reviews

# CodeRabbit auto-reviews ordinary PRs through .coderabbit.yaml. Bot-authored
# PRs can require an explicit prompt, so this workflow posts one prompt per PR
# without requiring a label or human action.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to request review for'
        required: true
        type: number

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: bot-review-trigger-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  trigger-reviews:
    name: Trigger CodeRabbit
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.draft == false && github.event.pull_request.user.type == 'Bot') }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CodeRabbit review once
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- coderabbit-auto-review -->';
            const { owner, repo } = context.repo;
            const issue_number =
              context.payload.pull_request?.number ??
              Number(context.payload.inputs?.pr_number);

            if (!Number.isInteger(issue_number) || issue_number <= 0) {
              throw new Error('Missing valid PR number.');
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const alreadyPrompted = comments.some((comment) => comment.body?.includes(marker));
            if (alreadyPrompted) {
              core.info(`CodeRabbit prompt already exists on PR #${issue_number}; skipping.`);
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: [
                marker,
                '@coderabbitai review',
                '',
                'Revisar somente bugs funcionais, regressoes, seguranca, quebra de contrato, SEO e violacoes explicitas das regras do projeto. Ignorar estilo, elogios, renomeacoes, micro-otimizacoes e oportunidades hipoteticas.',
              ].join('\n'),
            });
