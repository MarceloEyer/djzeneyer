name: 🚀 Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tailwind.config.js'
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # Todo dia às 04:00 UTC (06:00 CEST / 01:00 BRT)

permissions:
  contents: read

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: 22.13.0
  SSH_HOST: 147.79.84.222
  SSH_PORT: 65002
  SSH_USER: u790739895
  REMOTE_ROOT: /home/u790739895/domains/djzeneyer.com/public_html
  THEME_NAME: zentheme
  SITE_URL: https://djzeneyer.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

jobs:
  build-and-deploy:
    name: 🏗️ Build & Deploy React App
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🗺️ Generate sitemaps
        run: |
          npm run generate-sitemaps
          if [ ! -f "public/sitemap.xml" ]; then echo "❌ sitemap missing"; exit 1; fi

      - name: 🔑 Write IndexNow key verification file
        run: |
          if [ -n "$INDEXNOW_KEY" ]; then
            echo -n "$INDEXNOW_KEY" > "public/${INDEXNOW_KEY}.txt"
            echo "✅ IndexNow key file written: public/${INDEXNOW_KEY}.txt"
          else
            echo "⚠️  INDEXNOW_KEY secret not set — skipping key file."
          fi

      - name: 🔨 Build production
        env:
          NODE_ENV: production
          PRERENDER_MODE: 'true'
          VITE_WP_SITE_URL: ${{ env.SITE_URL }}
          VITE_WP_REST_URL: ${{ env.SITE_URL }}/wp-json/
          VITE_WC_CONSUMER_KEY: ${{ secrets.VITE_WC_CONSUMER_KEY }}
          VITE_WC_CONSUMER_SECRET: ${{ secrets.VITE_WC_CONSUMER_SECRET }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: 🎨 Prerender pages (SSG)
        run: |
          npx puppeteer browsers install chrome-headless-shell
          node scripts/prerender.js
          if [ ! -f "dist/index.html" ]; then echo "❌ Prerender failed"; exit 1; fi

      - name: 🤖 Generate Markdown for Agents
        continue-on-error: true
        run: npm run generate-markdown

      - name: 🔐 Setup SSH
        uses: shimataro/ssh-key-action@87a8f067114a8ce263df83e9ed5c849953548bc3 # v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: |
            |1|TNUVcyD1aWr2wGYOmlQPeemFgTE=|5B1Q6wvwM69bU8G3GUrrKiRut0o= ssh-rsa 
            |1|/fdbloAM89tpWbUllaYu487m+XE=|6vm64/rMpLGUlMAoh8eC3hF7HAY= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBFxQCICOTF37QQ0qOp8sP5FxG9Na/euvpJY66hO14H6atxwu3wCoNXHhiY8nRUxmq4yzhDsEuklJuVWM+4vSDPY=
            |1|j3r8EBK800IPfRXohTW0XOek1Ks=|Vp6bWwZs1aymxjlr/UZPDreSUs8= ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ3BBPDXxVSsh7zTZu2jBnm08DuW6HYGb6V4fKXFCSyD
          name: id_rsa

      - name: 📦 Prepare and Backup Remote
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ env.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            THEME_PATH="${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}"
            NEXT_DIST_PATH="${THEME_PATH}/dist-next"
            rm -rf "${NEXT_DIST_PATH}"
            mkdir -p "${NEXT_DIST_PATH}"

      - name: 🚀 Deploy dist/
        uses: burnett01/rsync-deployments@66257cad6bfeb2171d3b6bfa6c9a22279dd9c3a1 # 8.0.5
        with:
          switches: -avzr --delete --checksum
          path: dist/
          remote_path: ${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}/dist-next/
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_port: ${{ env.SSH_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🔁 Activate dist
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ env.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            THEME_PATH="${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}"
            mv "${THEME_PATH}/dist-next" "${THEME_PATH}/dist-new"
            rm -rf "${THEME_PATH}/dist-prev"
            [ -d "${THEME_PATH}/dist" ] && mv "${THEME_PATH}/dist" "${THEME_PATH}/dist-prev"
            mv "${THEME_PATH}/dist-new" "${THEME_PATH}/dist"

      - name: 📄 Deploy public assets
        uses: burnett01/rsync-deployments@66257cad6bfeb2171d3b6bfa6c9a22279dd9c3a1 # 8.0.5
        with:
          switches: -avz --ignore-missing-args
          path: public/
          remote_path: ${{ env.REMOTE_ROOT }}/
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_port: ${{ env.SSH_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🧹 Purge caches
        continue-on-error: true
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ env.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            WP_CLI="/usr/local/bin/wp"
            $WP_CLI --path="${{ env.REMOTE_ROOT }}" transient delete --search="djz_vite_manifest" 2>/dev/null || true
            $WP_CLI --path="${{ env.REMOTE_ROOT }}" litespeed-purge all 2>/dev/null || true
            php -r "opcache_reset();" 2>/dev/null || true

      - name: 🌐 Purge Cloudflare CDN cache
        continue-on-error: true
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ZONE_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "✅ Cloudflare CDN cache purged"
          else
            echo "⚠️ Cloudflare purge failed: $RESPONSE"
            exit 1
          fi

      - name: 📡 Submit URLs to IndexNow
        continue-on-error: true
        env:
          INDEXNOW_STRICT: 'true'
        run: |
          if [ -n "$INDEXNOW_KEY" ]; then
            npm run indexnow
          else
            echo "⚠️  INDEXNOW_KEY not set — skipping IndexNow submission."
          fi

      - name: 🔖 Publish DNS-AID records
        continue-on-error: true
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ZONE_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: node scripts/publish-dns-aid-cloudflare.mjs --skip-doh
