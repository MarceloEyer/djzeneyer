name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Build and validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      SITE_BASE_URL: https://djzeneyer.com
      VITE_WP_SITE_URL: https://djzeneyer.com
      VITE_WP_REST_URL: https://djzeneyer.com/wp-json/

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run type-check

      - name: Architecture boundary check
        run: npm run arch:check

      - name: Docs internal links check
        run: npm run docs:links

      - name: API inventory freshness check
        run: npm run api:inventory:check

      - name: i18n parity check
        run: npm run i18n:check

      - name: UTF-8 content check
        run: npm run utf8:check

      - name: Workflow name contract check
        run: npm run workflow-names:check

      - name: SEO invariant check
        run: npm run seo:check

      - name: Generate sitemaps
        run: npm run generate-sitemaps

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Performance budget check
        run: npm run perf:budget

      - name: Validate build artifacts
        shell: bash
        run: |
          set -euo pipefail

          test -f dist/index.html
          test -f dist/.vite/manifest.json
          test -f public/sitemap.xml
          test -f public/sitemap-pages.xml
          test -f public/robots.txt

          grep -q 'https://djzeneyer.com' public/sitemap.xml
          grep -q 'https://djzeneyer.com' public/sitemap-pages.xml

      - name: Upload dist artifact on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: failed-quality-gate-dist
          path: |
            dist/
            public/sitemap*.xml
          if-no-files-found: ignore
          retention-days: 3
