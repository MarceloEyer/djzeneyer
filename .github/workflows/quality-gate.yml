name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Build and validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      NODE_ENV: production
      SITE_BASE_URL: https://djzeneyer.com
      VITE_WP_SITE_URL: https://djzeneyer.com
      VITE_WP_REST_URL: https://djzeneyer.com/wp-json/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: TypeScript check
        run: npm run type-check

      - name: i18n parity check
        run: npm run i18n:check

      - name: UTF-8 content check
        run: npm run utf8:check

      - name: Generate sitemaps
        run: npm run generate-sitemaps

      - name: Production build
        run: npm run build

      - name: Performance budget check
        run: npm run perf:budget

      - name: Validate build artifacts
        shell: bash
        run: |
          set -euo pipefail

          test -f dist/index.html
          test -f dist/pt/index.html
          test -f dist/.vite/manifest.json
          test -f public/sitemap.xml
          test -f public/sitemap-pages.xml
          test -f public/robots.txt

          grep -q 'https://djzeneyer.com' public/sitemap.xml
          grep -q 'https://djzeneyer.com' public/sitemap-pages.xml

      - name: Upload dist artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-quality-gate-dist
          path: |
            dist/
            public/sitemap*.xml
          if-no-files-found: ignore
          retention-days: 3
