name: 🐘 Deploy · Backend PHP

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'inc/**'
      - 'parts/**'
      - 'templates/**'
      - '*.php'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-deploy
  cancel-in-progress: false

env:
  SSH_HOST: 147.79.84.222
  SSH_PORT: 65002
  SSH_USER: u790739895
  REMOTE_ROOT: /home/u790739895/domains/djzeneyer.com/public_html
  THEME_NAME: zentheme
  SITE_URL: https://djzeneyer.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy-backend:
    name: 🚀 Deploy WP Plugins and Theme PHP
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: 🔨 Build plugin dependencies (Composer)
        run: |
          if [ -d "plugins" ]; then
            for dir in plugins/*/; do
              if [ -f "$dir/composer.json" ]; then
                cd "$dir"
                composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-interaction
                cd - > /dev/null
              fi
            done
          fi

      - name: 🔐 Setup SSH
        uses: shimataro/ssh-key-action@87a8f067114a8ce263df83e9ed5c849953548bc3 # v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: |
            |1|TNUVcyD1aWr2wGYOmlQPeemFgTE=|5B1Q6wvwM69bU8G3GUrrKiRut0o= ssh-rsa 
            |1|/fdbloAM89tpWbUllaYu487m+XE=|6vm64/rMpLGUlMAoh8eC3hF7HAY= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBFxQCICOTF37QQ0qOp8sP5FxG9Na/euvpJY66hO14H6atxwu3wCoNXHhiY8nRUxmq4yzhDsEuklJuVWM+4vSDPY=
            |1|j3r8EBK800IPfRXohTW0XOek1Ks=|Vp6bWwZs1aymxjlr/UZPDreSUs8= ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ3BBPDXxVSsh7zTZu2jBnm08DuW6HYGb6V4fKXFCSyD
          name: id_rsa

      - name: 🔌 Deploy plugins/
        if: hashFiles('plugins/**') != ''
        uses: burnett01/rsync-deployments@4d419d1dc46d4a8a2b6ceab2f951f0f93b2da8f5 # 9
        with:
          switches: -avzr --checksum --exclude='*.md' --exclude='tests/' --exclude='.git/'
          path: plugins/
          remote_path: ${{ env.REMOTE_ROOT }}/wp-content/plugins/
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_port: ${{ env.SSH_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📚 Deploy inc/
        if: hashFiles('inc/**') != ''
        uses: burnett01/rsync-deployments@4d419d1dc46d4a8a2b6ceab2f951f0f93b2da8f5 # 9
        with:
          switches: -avzr --delete --checksum
          path: inc/
          remote_path: ${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}/inc/
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_port: ${{ env.SSH_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📚 Deploy parts/
        if: hashFiles('parts/**') != ''
        uses: burnett01/rsync-deployments@4d419d1dc46d4a8a2b6ceab2f951f0f93b2da8f5 # 9
        with:
          switches: -avzr --delete --checksum
          path: parts/
          remote_path: ${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}/parts/
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_port: ${{ env.SSH_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📚 Deploy templates/
        if: hashFiles('templates/**') != ''
        uses: burnett01/rsync-deployments@4d419d1dc46d4a8a2b6ceab2f951f0f93b2da8f5 # 9
        with:
          switches: -avzr --delete --checksum
          path: templates/
          remote_path: ${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}/templates/
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_port: ${{ env.SSH_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📝 Deploy root theme PHP files
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ env.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "functions.php,header.php,footer.php,index.php"
          target: ${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}/
          strip_components: 0

      - name: 🧹 Purge caches
        continue-on-error: true
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ env.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            php -r "opcache_reset();" 2>/dev/null || true
