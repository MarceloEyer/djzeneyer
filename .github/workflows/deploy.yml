# ═══════════════════════════════════════════════════════════════════════════════
# 🚀 DJ ZEN EYER - PRODUCTION DEPLOY (RESTORED v4.1 + PRERENDER FIX)
# ═══════════════════════════════════════════════════════════════════════════════
# Lógica: Baseada estritamente no log de sucesso v4.1
# Adições: Prerender (Build) e Sync de Imagens (Deploy)
# ═══════════════════════════════════════════════════════════════════════════════

name: 🚀 Production Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build (use existing artifact)'
        required: false
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SSH_HOST: 147.79.84.222
  SSH_PORT: 65002
  SSH_USER: u790739895
  REMOTE_ROOT: /home/u790739895/domains/djzeneyer.com/public_html
  THEME_NAME: zentheme
  SITE_URL: https://djzeneyer.com

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # JOB 1: BUILD
  # ═══════════════════════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: ${{ !inputs.skip_build }}
    
    outputs:
      commit_hash: ${{ steps.commit.outputs.hash }}
      build_timestamp: ${{ steps.timestamp.outputs.value }}
      build_status: ${{ job.status }}
      plugins_changed: ${{ steps.plugin_changes.outputs.changed }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: 🔖 Generate metadata
        id: commit
        run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: ⏰ Generate timestamp
        id: timestamp
        run: echo "value=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Detect plugin changes
        id: plugin_changes
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            RANGE="HEAD^..HEAD"
          else
            RANGE="HEAD"
          fi

          if git diff --name-only "$RANGE" | grep -q '^plugins/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🔒 Security audit
        run: npm audit --audit-level=high
        # Bloqueia o deploy se houver vulnerabilidades high/critical.
        # Impede que npm install do bolt.new ou outros ambientes externos
        # introduzam pacotes vulneráveis no lock file sem detecção.

      - name: 🗺️ Generate sitemaps
        run: |
          echo "🗺️ Generating sitemaps..."
          npm run generate-sitemaps
          # Validação mínima
          if [ ! -f "public/sitemap.xml" ]; then echo "❌ sitemap.xml missing"; exit 1; fi
          echo "✅ Sitemaps generated successfully"

      - name: 🔨 Build production
        env:
          NODE_ENV: production
          PRERENDER_MODE: 'true'
          VITE_WP_SITE_URL: ${{ env.SITE_URL }}
          VITE_WP_REST_URL: ${{ env.SITE_URL }}/wp-json/
          VITE_WC_CONSUMER_KEY: ${{ secrets.VITE_WC_CONSUMER_KEY }}
          VITE_WC_CONSUMER_SECRET: ${{ secrets.VITE_WC_CONSUMER_SECRET }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

      # ⭐ ADIÇÃO: PRERENDER (Obrigatório para evitar tela branca)
      - name: 🎨 Prerender pages (SSG)
        run: |
          echo "🎨 Starting prerender..."
          if ! npm list puppeteer >/dev/null 2>&1; then npm install puppeteer; fi
          node scripts/prerender.js
          if [ ! -f "dist/index.html" ]; then echo "❌ Prerender failed"; exit 1; fi
          echo "✅ Prerender OK"

      - name: ✅ Validate build
        run: |
          if [ ! -d dist ]; then echo "❌ dist/ not found"; exit 1; fi
          if [ ! -f dist/index.html ]; then echo "❌ dist/index.html not found"; exit 1; fi
          echo "✅ Build validation passed"

      # --- PLUGIN DEPENDENCIES ---
      - name: 🔨 Build plugin dependencies
        run: |
          echo "📦 Building plugins..."
          if [ -d "plugins" ]; then
            for dir in plugins/*/; do
              if [ -f "$dir/composer.json" ]; then
                cd "$dir"
                # ⚠️ CI hardening note (do not "optimize" this without validation):
                # Composer 2.9+ can block packages flagged by Packagist security advisories.
                # IMPORTANT: NEVER add --no-audit here; this option is not available in composer install
                # and causes the pipeline to fail with: "The \"--no-audit\" option does not exist."
                composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-interaction
                rm -rf tests/ .git/ .github/ .gitignore
                cd - > /dev/null
              fi
            done
          fi

      # --- ARTIFACTS ---
      - name: 📤 Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-dist-${{ steps.commit.outputs.hash }}
          path: dist/
          include-hidden-files: true
          retention-days: 7
          compression-level: 6

      - name: 📤 Upload theme files
        uses: actions/upload-artifact@v7
        with:
          name: build-theme-${{ steps.commit.outputs.hash }}
          path: |
            functions.php
            style.css
            screenshot.png
            header.php
            footer.php
            index.php
          retention-days: 7

      - name: 📤 Upload plugins
        if: steps.plugin_changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: build-plugins-${{ steps.commit.outputs.hash }}
          path: plugins/
          retention-days: 7

      - name: 📤 Upload sitemaps
        uses: actions/upload-artifact@v7
        with:
          name: build-sitemaps-${{ steps.commit.outputs.hash }}
          path: |
            public/sitemap.xml
            public/sitemap-pages.xml
          retention-days: 7

# ═══════════════════════════════════════════════════════════════════════════════
  # JOB 2: DEPLOY (RESTAURADO DO LOG ORIGINAL)
  # ═══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: |
      always() && 
      (needs.build.result == 'success' || inputs.skip_build)
    
    environment:
      name: production
      url: ${{ env.SITE_URL }}
    
    steps:
      - name: 📥 Checkout (sparse)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            inc
            public
            parts
            templates
          sparse-checkout-cone-mode: false

      # --- DOWNLOAD ARTIFACTS ---
      - name: 📥 Download dist
        if: ${{ !inputs.skip_build }}
        uses: actions/download-artifact@v8
        with:
          name: build-dist-${{ needs.build.outputs.commit_hash }}
          path: ./dist

      - name: 📥 Download theme files
        if: ${{ !inputs.skip_build }}
        uses: actions/download-artifact@v8
        with:
          name: build-theme-${{ needs.build.outputs.commit_hash }}
          path: ./

      - name: 📥 Download plugins
        if: ${{ !inputs.skip_build && needs.build.outputs.plugins_changed == 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: build-plugins-${{ needs.build.outputs.commit_hash }}
          path: ./plugins

      - name: 📥 Download sitemaps
        if: ${{ !inputs.skip_build }}
        uses: actions/download-artifact@v8
        with:
          name: build-sitemaps-${{ needs.build.outputs.commit_hash }}
          path: ./sitemaps-deploy

      # --- SSH SETUP ---
      - name: 🔐 Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          name: id_rsa

      # --- DIAGNOSTIC ---
      - name: 🔍 Check Connectivity
        run: |
          echo "🔍 Testing connection to ${{ env.SSH_HOST }}:${{ env.SSH_PORT }}..."
          nc -zv -w 15 ${{ env.SSH_HOST }} ${{ env.SSH_PORT }} || echo "⚠️ Warning: Host unreachable via nc, but continuing..."

      # --- BACKUP & CLEANUP ---
      - name: 📦 Backup & Clean dist folder
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ env.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300s
          command_timeout: 15m
          script: |
            set -e
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_DIR="$HOME/backups/deploy_${TIMESTAMP}"
            THEME_PATH="${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}"
            NEXT_DIST_PATH="${THEME_PATH}/dist-next"
            
            echo "📦 BACKUP & PREPARE STAGING DIST"
            mkdir -p "${BACKUP_DIR}"
            if [ -d "${THEME_PATH}/dist" ]; then
              tar -czf "${BACKUP_DIR}/dist_backup.tar.gz" -C "${THEME_PATH}" dist/ 2>/dev/null || true
            fi
            rm -rf "${NEXT_DIST_PATH}"
            mkdir -p "${NEXT_DIST_PATH}"
            mkdir -p "${{ env.REMOTE_ROOT }}/wp-content/plugins"
            
            # Cleanup old backups
            cd "$HOME/backups"
            ls -t | tail -n +6 | xargs -r rm -rf 2>/dev/null || true
            echo "✅ Cleanup done"

      # --- DEPLOY STEPS (IGUAL AO ORIGINAL v4.1) ---
      
      - name: 🚀 Deploy dist/
        uses: burnett01/rsync-deployments@8.0.5
        with:
          switches: -avzr --delete --checksum
          path: dist/
          remote_path: ${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}/dist-next/
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_port: ${{ env.SSH_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ESTE PASSO É O SEGREDO QUE ESTAVA FALTANDO! 👇
      - name: 📚 Deploy inc/
        if: hashFiles('inc/**') != ''
        uses: burnett01/rsync-deployments@8.0.5
        with:
          switches: -avzr --delete --checksum
          path: inc/
          remote_path: ${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}/inc/
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_port: ${{ env.SSH_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ADICIONADO PARA GARANTIR TEMAS MODERNOS
      - name: 📚 Deploy parts/
        if: hashFiles('parts/**') != ''
        uses: burnett01/rsync-deployments@8.0.5
        with:
          switches: -avzr --delete --checksum
          path: parts/
          remote_path: ${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}/parts/
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_port: ${{ env.SSH_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          
      - name: 📚 Deploy templates/
        if: hashFiles('templates/**') != ''
        uses: burnett01/rsync-deployments@8.0.5
        with:
          switches: -avzr --delete --checksum
          path: templates/
          remote_path: ${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}/templates/
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_port: ${{ env.SSH_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📝 Deploy theme PHP files
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "functions.php,style.css,screenshot.png,header.php,footer.php,index.php"
          target: ${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}/
          strip_components: 0

      - name: 🔁 Activate staged dist atomically
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ env.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300s
          command_timeout: 15m
          script: |
            set -e
            THEME_PATH="${{ env.REMOTE_ROOT }}/wp-content/themes/${{ env.THEME_NAME }}"
            NEXT_DIST_PATH="${THEME_PATH}/dist-next"
            LIVE_DIST_PATH="${THEME_PATH}/dist"
            PREV_DIST_PATH="${THEME_PATH}/dist-prev"

            if [ ! -f "${NEXT_DIST_PATH}/index.html" ]; then
              echo "dist-next/index.html missing; aborting activation"
              exit 1
            fi

            rm -rf "${PREV_DIST_PATH}"
            if [ -d "${LIVE_DIST_PATH}" ]; then
              mv "${LIVE_DIST_PATH}" "${PREV_DIST_PATH}"
            fi

            mv "${NEXT_DIST_PATH}" "${LIVE_DIST_PATH}"
            rm -rf "${PREV_DIST_PATH}"
            echo "✅ dist activated without deleting the live bundle first"

      - name: 🔌 Deploy plugins
        if: ${{ !inputs.skip_build && needs.build.outputs.plugins_changed == 'true' }}
        uses: burnett01/rsync-deployments@8.0.5
        with:
          switches: -avzr --checksum --exclude='*.md' --exclude='tests/' --exclude='.git/'
          path: plugins/
          remote_path: ${{ env.REMOTE_ROOT }}/wp-content/plugins/
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_port: ${{ env.SSH_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      # --- PUBLIC ASSETS & IMAGES FIX ---
      - name: 📄 Prepare public assets
        if: hashFiles('public/**') != ''
        run: |
          echo "📄 Preparing public assets..."
          mkdir -p temp_public
          
          # Arquivos básicos
          SAFE_FILES=(".htaccess" "robots.txt" "ai-bots.txt" "llms.txt" "llms-full.txt" "favicon.ico" "favicon.svg" "apple-touch-icon.png" "site.webmanifest")
          for file in "${SAFE_FILES[@]}"; do
            if [ -f "public/$file" ]; then cp "public/$file" temp_public/; fi
          done
          
          # ⭐ CORREÇÃO CRÍTICA: Copiar pasta de IMAGENS
          if [ -d "public/images" ]; then
             echo "  ✓ Including images/ folder"
             cp -r "public/images" temp_public/
          fi
          
          # Copiar .well-known
          if [ -d "public/.well-known" ]; then
             cp -r "public/.well-known" temp_public/
          fi

      - name: 📄 Deploy public assets
        if: hashFiles('public/**') != ''
        uses: burnett01/rsync-deployments@8.0.5
        with:
          switches: -avz --ignore-missing-args
          path: temp_public/
          remote_path: ${{ env.REMOTE_ROOT }}/
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_port: ${{ env.SSH_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      # --- SITEMAPS ---
      - name: 🗺️ Deploy sitemaps to ROOT
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "sitemaps-deploy/sitemap.xml,sitemaps-deploy/sitemap-pages.xml"
          target: ${{ env.REMOTE_ROOT }}/
          strip_components: 1

      # --- CACHE PURGE ---
      - name: 🧹 Purge caches
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ env.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            WP_ROOT="${{ env.REMOTE_ROOT }}"

            # Locate wp-cli — check PATH and common hosting locations
            WP_CLI=""
            for candidate in \
              "$(command -v wp 2>/dev/null)" \
              "$HOME/bin/wp" \
              "$HOME/.local/bin/wp" \
              "/usr/local/bin/wp" \
              "/usr/bin/wp" \
              "$HOME/public_html/wp" \
              "/opt/cpanel/ea-php82/root/usr/bin/wp"; do
              if [ -n "$candidate" ] && [ -x "$candidate" ]; then
                WP_CLI="$candidate"
                break
              fi
            done

            if [ -n "$WP_CLI" ]; then
              echo "✅ WP CLI found: $WP_CLI"
              # LiteSpeed full purge
              "$WP_CLI" --path="$WP_ROOT" litespeed-purge all 2>/dev/null || true
              # Clear Vite manifest transient so new CSS/JS hashes are picked up immediately
              "$WP_CLI" --path="$WP_ROOT" transient delete --search="djz_vite_manifest" 2>/dev/null || true
              # Clear ZenGame transient cache
              "$WP_CLI" --path="$WP_ROOT" transient delete --search="djz_gamipress" 2>/dev/null || true
              "$WP_CLI" --path="$WP_ROOT" transient delete --search="djz_stats" 2>/dev/null || true
              echo "✅ WP CLI cache purge complete"
            else
              echo "⚠️ WP CLI not found — LiteSpeed purge skipped (purge manually if CSS/JS looks stale)"
            fi

            # OPcache flush
            if php -r "opcache_reset();" 2>/dev/null; then
              echo "✅ OPcache flushed"
            else
              curl -s "${{ env.SITE_URL }}/?opcache_reset=1" -o /dev/null
            fi

      - name: 🎉 Success
        if: success()
        run: echo "🚀 Site Live at ${{ env.SITE_URL }}"
