name: Capture SSH host key

on:
  push:
    paths:
      - '.github/workflows/capture-ssh-host-key.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Capture SSH host key
        run: |
          timeout 20 ssh-keyscan -T 10 -p 65002 -t rsa,ecdsa,ed25519 147.79.84.222 > .github/ssh_known_hosts
          test -s .github/ssh_known_hosts
          cat .github/ssh_known_hosts

      - name: Commit pinned host key
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ssh_known_hosts
          git diff --cached --quiet || git commit -m "security: pin SSH host key"
          git push
