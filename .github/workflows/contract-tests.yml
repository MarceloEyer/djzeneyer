name: "Contract Tests"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── Fixture-based contract tests (no network, blocks on failure) ──────────
  contract-fixtures:
    name: Contract Tests (fixture)
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: 2
        persist-credentials: false

    - name: Setup Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run contract tests
      run: npx vitest run src/__tests__/contracts/

  # ── Smoke test against live production (informational, never blocks) ──────
  smoke-production:
    name: Smoke Production Contracts
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    continue-on-error: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: 2
        persist-credentials: false

    - name: Setup Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Smoke test live endpoint
      env:
        CI_BYPASS_SECRET: ${{ secrets.CI_BYPASS_SECRET }}
      run: npx tsx scripts/test-contracts.ts
