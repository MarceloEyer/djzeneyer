name: Validate Bot Regex

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'inc/ssr-handler.php'
      - 'verification/generate_regex.php'
      - 'verification/validate_regex.php'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'
      - name: Compare Regex
        run: php verification/validate_regex.php
