version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "deps-patch"
      - "chore"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "composer"
    directory: "/plugins/zeneyer-auth"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    labels:
      - "deps-patch"
      - "chore"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "deps-patch"
      - "chore"
